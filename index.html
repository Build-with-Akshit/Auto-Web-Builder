<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Website Builder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Mobile View Fix: 100dvh ensures full height on mobile browsers */
        body {
            min-height: 100dvh;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background-color: #0f172a; /* Slate 900 */
            color: white;
            font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #1e293b; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #64748b; }

        .loader {
            border: 2px solid #f3f3f3;
            border-top: 2px solid #3b82f6;
            border-radius: 50%;
            width: 16px;
            height: 16px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        iframe { background: white; width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <div class="flex h-full w-full">

        <aside class="w-64 bg-slate-900 border-r border-slate-700 flex flex-col hidden md:flex shrink-0">
            <div class="p-4 border-b border-slate-700">
                <button onclick="createNewProject()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-4 rounded transition flex items-center justify-center gap-2">
                    <span>+</span> New Project
                </button>
            </div>

            <div class="flex-1 overflow-y-auto p-2 space-y-2" id="projectList">
                </div>

            <div class="p-4 border-t border-slate-700">
                <button onclick="toggleSettings()" class="flex items-center gap-2 text-slate-400 hover:text-white transition w-full">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.09a2 2 0 0 1-1-1.74v-.47a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
                    Settings
                </button>
            </div>
        </aside>

        <main class="flex-1 flex flex-col bg-slate-800 relative">
            
            <header class="h-14 border-b border-slate-700 bg-slate-900 flex items-center justify-between px-4 shrink-0">
                <div class="flex gap-2">
                    <div class="w-3 h-3 rounded-full bg-red-500"></div>
                    <div class="w-3 h-3 rounded-full bg-yellow-500"></div>
                    <div class="w-3 h-3 rounded-full bg-green-500"></div>
                </div>

                <div class="flex bg-slate-800 rounded p-1">
                    <button id="btnPreview" onclick="setView('preview')" class="px-4 py-1 rounded text-sm font-medium bg-blue-600 text-white">Preview</button>
                    <button id="btnCode" onclick="setView('code')" class="px-4 py-1 rounded text-sm font-medium text-slate-400 hover:text-white">Code</button>
                </div>

                <button onclick="downloadCode()" class="text-slate-400 hover:text-white" title="Download HTML">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                </button>
            </header>

            <div class="flex-1 relative overflow-hidden">
                <div id="viewPreview" class="absolute inset-0 w-full h-full">
                    <iframe id="previewFrame" sandbox="allow-scripts allow-modals"></iframe>
                </div>
                <div id="viewCode" class="absolute inset-0 w-full h-full hidden bg-slate-900">
                    <textarea id="codeEditor" class="w-full h-full bg-slate-900 text-green-400 font-mono p-4 resize-none focus:outline-none text-sm" spellcheck="false" readonly></textarea>
                </div>
            </div>

            <footer class="p-4 bg-slate-900 border-t border-slate-700 shrink-0">
                <form id="chatForm" onsubmit="handleSend(event)" class="relative flex gap-2 max-w-4xl mx-auto">
                    <textarea id="promptInput" rows="1" class="w-full bg-slate-800 text-white rounded-lg pl-4 pr-12 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500 resize-none overflow-hidden" placeholder="Describe your website..." style="min-height: 48px; max-height: 120px;" oninput="this.style.height = ''; this.style.height = this.scrollHeight + 'px'"></textarea>
                    
                    <button type="submit" id="sendBtn" class="absolute right-2 bottom-2 bg-blue-600 hover:bg-blue-700 text-white p-2 rounded-md transition disabled:opacity-50 disabled:cursor-not-allowed">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
                    </button>
                </form>
            </footer>

        </main>
    </div>

    <div id="settingsModal" class="fixed inset-0 bg-black/50 hidden flex items-center justify-center z-50">
        <div class="bg-slate-800 border border-slate-700 p-6 rounded-lg w-96 shadow-xl">
            <h2 class="text-xl font-bold mb-4">Settings</h2>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-sm text-slate-400 mb-1">API URL</label>
                    <input type="text" id="settingUrl" class="w-full bg-slate-900 border border-slate-700 rounded p-2 text-sm focus:outline-none focus:border-blue-500" value="https://openrouter.ai/api/v1/chat/completions">
                </div>
                <div>
                    <label class="block text-sm text-slate-400 mb-1">API Key</label>
                    <input type="password" id="settingKey" class="w-full bg-slate-900 border border-slate-700 rounded p-2 text-sm focus:outline-none focus:border-blue-500" placeholder="sk-or-...">
                </div>
                <div>
                    <label class="block text-sm text-slate-400 mb-1">Model ID</label>
                    <input type="text" id="settingModel" class="w-full bg-slate-900 border border-slate-700 rounded p-2 text-sm focus:outline-none focus:border-blue-500" value="deepseek/deepseek-r1:free">
                </div>
            </div>

            <div class="mt-6 flex justify-end gap-2">
                <button onclick="toggleSettings()" class="px-4 py-2 text-slate-400 hover:text-white">Cancel</button>
                <button onclick="saveSettings()" class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700">Save</button>
            </div>
        </div>
    </div>

    <script>
        // --- Constants & State ---
        const SYSTEM_PROMPT = "You are a web developer. Output ONLY raw HTML code including standard Tailwind CSS CDN if needed. Do not use markdown backticks. Do not use ```html wrappers. Do not add explanations. Return the full code starting with <!DOCTYPE html>.";
        
        let state = {
            projects: [],
            currentId: null,
            html: '',
            settings: {
                url: "https://openrouter.ai/api/v1/chat/completions",
                key: "",
                model: "deepseek/deepseek-r1:free"
            }
        };

        // --- Initialization ---
        document.addEventListener('DOMContentLoaded', () => {
            loadState();
            if (state.projects.length === 0) createNewProject();
            else if (state.currentId) loadProject(state.currentId);
            else loadProject(state.projects[0].id);
        });

        // --- Core Logic ---

        async function handleSend(e) {
            e.preventDefault();
            const input = document.getElementById('promptInput');
            const btn = document.getElementById('sendBtn');
            const prompt = input.value.trim();
            
            if (!prompt) return;
            if (!state.settings.key) {
                alert("Please set your API Key in Settings first.");
                toggleSettings();
                return;
            }

            // UI Loading State
            input.disabled = true;
            btn.disabled = true;
            btn.innerHTML = '<div class="loader"></div>';

            try {
                // 1. Prepare history for context (optional, simple version sends just system + prompt)
                const messages = [
                    { role: "system", content: SYSTEM_PROMPT },
                    { role: "user", content: `Current Code:\n${state.html}\n\nRequest: ${prompt}` }
                ];

                // 2. Fetch API (Anti-Crash Logic)
                const response = await fetch(state.settings.url, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${state.settings.key}`,
                        "HTTP-Referer": window.location.href, // OpenRouter requirement
                        "X-Title": "AI Website Builder"
                    },
                    body: JSON.stringify({
                        model: state.settings.model,
                        messages: messages
                    })
                });

                // 3. Strict Parsing
                const text = await response.text(); 
                if (!response.ok) {
                    throw new Error(`API Error: ${text}`);
                }
                
                const data = JSON.parse(text);
                const newCode = data.choices[0].message.content.trim();

                // 4. Update State
                updateProjectCode(newCode);

                input.value = "";
            } catch (err) {
                alert(err.message);
            } finally {
                input.disabled = false;
                btn.disabled = false;
                btn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>';
                input.focus();
            }
        }

        function updateProjectCode(code) {
            // Remove markdown if model hallucinates it despite prompt
            let cleanCode = code.replace(/```html/g, '').replace(/```/g, '');
            
            state.html = cleanCode;
            document.getElementById('previewFrame').srcdoc = cleanCode;
            document.getElementById('codeEditor').value = cleanCode;
            
            // Save to current project
            const projIndex = state.projects.findIndex(p => p.id === state.currentId);
            if (projIndex >= 0) {
                state.projects[projIndex].html = cleanCode;
                state.projects[projIndex].updated = new Date().toISOString();
                saveState();
            }
        }

        // --- Project Management ---

        function createNewProject() {
            const id = Date.now().toString();
            const newProject = {
                id: id,
                name: `Project ${state.projects.length + 1}`,
                html: '<!DOCTYPE html><html><body style="display:flex;align-items:center;justify-content:center;height:100vh;font-family:sans-serif;"><h1>Hello World</h1></body></html>',
                updated: new Date().toISOString()
            };
            
            state.projects.unshift(newProject);
            loadProject(id);
        }

        function loadProject(id) {
            state.currentId = id;
            const project = state.projects.find(p => p.id === id);
            if (!project) return;

            state.html = project.html;
            document.getElementById('previewFrame').srcdoc = project.html;
            document.getElementById('codeEditor').value = project.html;
            
            renderProjectList();
            saveState();
        }

        function renderProjectList() {
            const list = document.getElementById('projectList');
            list.innerHTML = state.projects.map(p => `
                <div onclick="loadProject('${p.id}')" 
                     class="p-3 rounded cursor-pointer transition ${p.id === state.currentId ? 'bg-slate-700 text-white' : 'text-slate-400 hover:bg-slate-800'}">
                    <div class="font-medium">${p.name}</div>
                    <div class="text-xs opacity-60">${new Date(p.updated).toLocaleTimeString()}</div>
                </div>
            `).join('');
        }

        // --- UI Utils ---

        function setView(mode) {
            const btnPreview = document.getElementById('btnPreview');
            const btnCode = document.getElementById('btnCode');
            const viewPreview = document.getElementById('viewPreview');
            const viewCode = document.getElementById('viewCode');

            if (mode === 'preview') {
                btnPreview.className = "px-4 py-1 rounded text-sm font-medium bg-blue-600 text-white";
                btnCode.className = "px-4 py-1 rounded text-sm font-medium text-slate-400 hover:text-white";
                viewPreview.classList.remove('hidden');
                viewCode.classList.add('hidden');
            } else {
                btnPreview.className = "px-4 py-1 rounded text-sm font-medium text-slate-400 hover:text-white";
                btnCode.className = "px-4 py-1 rounded text-sm font-medium bg-blue-600 text-white";
                viewPreview.classList.add('hidden');
                viewCode.classList.remove('hidden');
            }
        }

        function toggleSettings() {
            const modal = document.getElementById('settingsModal');
            if (modal.classList.contains('hidden')) {
                // Open: Populate fields
                document.getElementById('settingUrl').value = state.settings.url;
                document.getElementById('settingKey').value = state.settings.key;
                document.getElementById('settingModel').value = state.settings.model;
                modal.classList.remove('hidden');
            } else {
                modal.classList.add('hidden');
            }
        }

        function saveSettings() {
            state.settings.url = document.getElementById('settingUrl').value;
            state.settings.key = document.getElementById('settingKey').value;
            state.settings.model = document.getElementById('settingModel').value;
            saveState();
            toggleSettings();
        }

        function downloadCode() {
            const blob = new Blob([state.html], { type: 'text/html' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'index.html';
            a.click();
        }

        // --- Storage ---
        function saveState() {
            localStorage.setItem('ai_builder_state', JSON.stringify(state));
        }

        function loadState() {
            const saved = localStorage.getItem('ai_builder_state');
            if (saved) {
                const parsed = JSON.parse(saved);
                state.projects = parsed.projects || [];
                state.settings = { ...state.settings, ...parsed.settings }; // Merge to keep defaults if new keys added
                state.currentId = parsed.currentId;
            }
        }
    </script>
</body>
</html>
